<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>RSS Notify</title>
    <style>
      :root {
        --bg: #16181d;
        --panel: #1f232b;
        --border: #2c313c;
        --text: #e6e8ec;
        --muted: #8a909c;
        --accent: #5b8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      h1 { margin: 0 0 12px; font-size: 16px; font-weight: 600; }
      .add-form { display: flex; gap: 8px; flex-wrap: wrap; }
      input {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        padding: 8px 10px;
        font-size: 13px;
      }
      input#name { flex: 0 0 160px; }
      input#url { flex: 1 1 240px; }
      input#interval { flex: 0 0 90px; }
      button {
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        padding: 8px 14px;
      }
      button#add { background: var(--accent); color: #fff; }
      button.remove { background: transparent; color: var(--muted); padding: 2px 8px; }
      button.remove:hover { color: #ff6b6b; }
      main { display: grid; grid-template-columns: 240px 1fr; min-height: 0; }
      .col { padding: 14px 16px; overflow-y: auto; }
      .col.feeds { border-right: 1px solid var(--border); background: var(--panel); }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 0 0 10px; }
      ul { list-style: none; margin: 0; padding: 0; }
      ul#feeds li {
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
        padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; background: var(--bg);
      }
      ul#feeds li span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      ul#items li { padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; background: var(--panel); }
      ul#items a { color: var(--accent); text-decoration: none; font-weight: 500; }
      ul#items a:hover { text-decoration: underline; }
      .meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
      .empty { color: var(--muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <header>
      <h1>RSS Notify</h1>
      <div class="add-form">
        <input id="name" placeholder="Name" />
        <input id="url" placeholder="https://example.com/feed.xml" />
        <input id="interval" type="number" min="10" value="300" title="Interval (sec)" />
        <button id="add">Add</button>
      </div>
    </header>
    <main>
      <div class="col feeds">
        <h2>Feeds</h2>
        <ul id="feeds"></ul>
      </div>
      <div class="col">
        <h2>New items</h2>
        <ul id="items"></ul>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
